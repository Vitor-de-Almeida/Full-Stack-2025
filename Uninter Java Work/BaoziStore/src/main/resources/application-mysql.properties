# MySQL local — crie o schema antes: CREATE DATABASE baozidb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
# Ajuste usuário/senha conforme sua instalação (ex.: Beekeeper / Workbench).
spring.datasource.url=jdbc:mysql://localhost:3306/baozidb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
